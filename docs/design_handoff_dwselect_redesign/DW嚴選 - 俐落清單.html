<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DW嚴選 · 俐落清單（C 路線）</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800;900&family=Noto+Serif+TC:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #2b2722; }
  * { box-sizing: border-box; }
  ::view-transition-group(*) { animation-duration: .44s; animation-timing-function: cubic-bezier(.45,0,.15,1); }
  ::view-transition-old(root), ::view-transition-new(root) { animation-duration: .26s; }
  @media (prefers-reduced-motion: reduce) { ::view-transition-group(*) { animation-duration: .01ms !important; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="frames/dw-data.js"></script>
<script type="text/babel" src="frames/ios-frame.jsx"></script>
<script type="text/babel" src="frames/browser-window.jsx"></script>
<script type="text/babel" src="frames/design-canvas.jsx"></script>
<script type="text/babel" src="frames/dw-shared.jsx"></script>
<script type="text/babel" src="frames/dw-dir-c2.jsx"></script>

<script type="text/babel">
  // iPad bezel (simple, no starter needed)
  function IPad({ children, w = 820, h = 1180 }) {
    return (
      <div style={{ width: w, height: h, background: '#0d0d0f', borderRadius: 46, padding: 13,
        boxShadow: '0 40px 90px rgba(0,0,0,0.22), 0 0 0 1px rgba(0,0,0,0.15)' }}>
        <div style={{ width: '100%', height: '100%', borderRadius: 33, overflow: 'hidden', position: 'relative', background: '#000' }}>
          {children}
        </div>
      </div>
    );
  }

  function App() {
    const board = { background: 'transparent', boxShadow: 'none' };
    return (
      <DesignCanvas>
        <DCSection id="c" title="DW嚴選 · 俐落清單（C 路線）"
          subtitle="同一套設計，三種尺寸 — 底部/側邊導覽：首頁・指南・搜尋・連結。右上角可切換深／淺色（每台各自示範），點商品看詳情。">
          <DCArtboard id="phone" label="iPhone · 深色" width={402} height={874} style={board}>
            <IOSDevice dark><DWCApp mode="phone" initialTheme="dark" /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="ipad" label="iPad · 淺色" width={820} height={1180} style={board}>
            <IPad><DWCApp mode="tablet" initialTheme="light" /></IPad>
          </DCArtboard>
          <DCArtboard id="desktop" label="桌機 · 深色" width={1280} height={820} style={board}>
            <ChromeWindow width={1280} height={820} url="applepig.idv.tw/dwselect" tabs={[{ title: 'DW嚴選' }]}>
              <DWCApp mode="desktop" initialTheme="dark" />
            </ChromeWindow>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
