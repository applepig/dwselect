name: Static Generate

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Nuxt build cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.cache/nuxt
            .nuxt
          key: nuxt-build-${{ runner.os }}-node-24-${{ hashFiles('pnpm-lock.yaml', 'nuxt.config.ts', 'app/**', 'scripts/**', 'content/**') }}
          restore-keys: |
            nuxt-build-${{ runner.os }}-node-24-
            nuxt-build-${{ runner.os }}-

      - name: Run tests
        run: pnpm test

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Generate static site
        run: pnpm generate

      - name: Assert runtime has no Google Sheets TSV references
        run: node scripts/assert-runtime-google-sheet-clean.ts

      - name: Upload static artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-site
          path: .output/public
          if-no-files-found: error

  deploy:
    needs: quality-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Download static artifact
        uses: actions/download-artifact@v4
        with:
          name: static-site
          path: .output/public

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy .output/public --project-name=dwselect --branch=master
