name: Static Generate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  static-generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Generate static site
        run: pnpm generate

      - name: Assert runtime has no Google Sheets TSV references
        run: node scripts/assert-runtime-google-sheet-clean.ts

      - name: Upload static artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-site
          path: .output/public
          if-no-files-found: error
