name: Static Generate

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    env:
      APP_URL: dwselect.applepig.net

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Nuxt build cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.cache/nuxt
            .nuxt
          key: nuxt-build-${{ runner.os }}-node-24-${{ hashFiles('pnpm-lock.yaml', 'nuxt.config.ts', 'app/**', 'scripts/**', 'content/**') }}
          restore-keys: |
            nuxt-build-${{ runner.os }}-node-24-
            nuxt-build-${{ runner.os }}-

      - name: Run tests
        run: pnpm test

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Generate static site
        env:
          DWSELECT_ALLOW_HOST_GENERATE: "1"
        run: pnpm generate

      - name: Assert runtime has no Google Sheets TSV references
        run: node scripts/assert-runtime-google-sheet-clean.ts
