name: Deploy

on:
  push:
    branches:
      - master

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_URL: dwselect.applepig.net

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Nuxt build cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.cache/nuxt
            .nuxt
          key: nuxt-build-${{ runner.os }}-node-24-${{ hashFiles('pnpm-lock.yaml', 'nuxt.config.ts', 'app/**', 'scripts/**', 'content/**') }}
          restore-keys: |
            nuxt-build-${{ runner.os }}-node-24-
            nuxt-build-${{ runner.os }}-

      - name: Generate static site
        env:
          DWSELECT_ALLOW_HOST_GENERATE: "1"
        run: pnpm generate

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy .output/public --project-name=dwselect --branch=master
